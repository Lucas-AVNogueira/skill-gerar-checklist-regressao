<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    .card h1 {
      font-size: 1.75rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .card p.subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 0.875rem;
    }

    .options-row label {
      font-weight: 400;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      margin: 0;
    }

    .options-row a {
      color: #4f46e5;
      text-decoration: none;
    }

    .options-row a:hover {
      text-decoration: underline;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover {
      background: #4338ca;
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    .error-msg {
      display: none;
      color: #dc2626;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .divider {
      text-align: center;
      color: #9ca3af;
      font-size: 0.85rem;
      margin: 24px 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #e5e7eb;
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .register-link {
      text-align: center;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .register-link a {
      color: #4f46e5;
      font-weight: 600;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Bem-vindo!</h1>
    <p class="subtitle">Faça login para continuar</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" autocomplete="email" required />
        <span class="error-msg" id="emailError">Informe um e-mail válido.</span>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required minlength="6" />
        <span class="error-msg" id="passwordError">A senha deve ter pelo menos 6 caracteres.</span>
      </div>

      <div class="options-row">
        <label>
          <input type="checkbox" name="remember" /> Lembrar-me
        </label>
        <a href="#">Esqueci a senha</a>
      </div>

      <button type="submit">Entrar</button>
    </form>

    <div class="divider">ou</div>

    <p class="register-link">Não tem uma conta? <a href="#">Cadastre-se</a></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');

    function validateEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      let valid = true;

      if (!validateEmail(emailInput.value.trim())) {
        emailError.style.display = 'block';
        emailInput.style.borderColor = '#dc2626';
        valid = false;
      } else {
        emailError.style.display = 'none';
        emailInput.style.borderColor = '';
      }

      if (passwordInput.value.length < 6) {
        passwordError.style.display = 'block';
        passwordInput.style.borderColor = '#dc2626';
        valid = false;
      } else {
        passwordError.style.display = 'none';
        passwordInput.style.borderColor = '';
      }

      if (valid) {
        // Substitua esta lógica pela chamada à sua API de autenticação
        alert('Login realizado com sucesso!');
      }
    });
  </script>

</body>
</html>
